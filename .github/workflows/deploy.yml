name: Deploy VitePress Blog

on:
  # 修改代码并提交到 main 分支时，自动部署
  push:
    branches:
      - main

  # Issue 发生变化时，自动部署
  issues:
    types:
      - opened
      - edited
      - deleted
      - closed
      - reopened
      - labeled
      - unlabeled

  # 保留 Actions 页面中的手动运行按钮
  workflow_dispatch:

# 工作流所需权限
permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

# 避免连续修改时同时运行多个部署任务
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install VitePress
        run: npm install vitepress vue

      - name: Fetch Issues to Markdown
        run: node fetch-issues.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Site
        run: npx vitepress build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
