name: Deploy VitePress Blog

on:
  push:
    branches:
      - main

  issues:
    types:
      - opened
      - edited
      - deleted
      - closed
      - reopened
      - labeled
      - unlabeled

  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      SITE_URL: ${{ vars.SITE_URL }}
      SITE_BASE: ${{ vars.SITE_BASE }}
      VITE_GA_ID: ${{ vars.VITE_GA_ID }}
      VITE_GISCUS_REPO: ${{ vars.VITE_GISCUS_REPO }}
      VITE_GISCUS_REPO_ID: ${{ vars.VITE_GISCUS_REPO_ID }}
      VITE_GISCUS_CATEGORY: ${{ vars.VITE_GISCUS_CATEGORY }}
      VITE_GISCUS_CATEGORY_ID: ${{ vars.VITE_GISCUS_CATEGORY_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install vitepress@1.6.4 vue @giscus/vue@3.1.1

      - name: Fetch Issues to Markdown
        run: node fetch-issues.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Site
        run: npx vitepress build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
