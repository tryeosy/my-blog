name: Update README with Issues

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, milestones] # 当 Issue 发生变动时触发
  workflow_dispatch: # 支持手动触发

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予脚本修改和推送代码的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Issue List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python -c "
          import os, requests, re

          # 1. 获取所有公开的 Issues（排除 Pull Requests）
          url = f'https://github.com{os.environ[\"REPO\"]}/issues?state=open&per_page=100'
          headers = {'Authorization': f'token {os.environ[\"GITHUB_TOKEN\"]}'}
          issues = requests.get(url, headers=headers).json()
          
          # 2. 拼接 Markdown 列表
          lines = []
          for issue in issues:
              if 'pull_request' not in issue: # 过滤掉 PR
                  # 获取标签（分类）
                  labels = [f'\`{l[\"name\"]}\`' for l in issue.get('labels', [])]
                  label_str = ' ' + ' '.join(labels) if labels else ''
                  # 格式：- [文章标题](链接) [标签] (创建时间)
                  date = issue['created_at'][:10]
                  lines.append(f\"- [{issue['title']}]({issue['html_url']}){label_str} — _{date}_\")
          
          content = '\n'.join(lines) if lines else '- 暂无文章'

          # 3. 替换 README 中的锚点内容
          with open('README.md', 'r', encoding='utf-8') as f:
              readme = f.read()

          pattern = r'(<!-- BLOG-LIST-START -->)[\s\S]*(<!-- BLOG-LIST-END -->)'
          replacement = f'\\1\n\n{content}\n\n\\2'
          new_readme = re.sub(pattern, replacement, readme)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(new_readme)
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update blog list in README [skip ci]" || echo "No changes to commit"
          git push
