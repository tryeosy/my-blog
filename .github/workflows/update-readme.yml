name: Update README with Issues

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, milestones]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read # 显式赋予读取 Issues 的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README List
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 使用 GitHub 官方原生命令行工具直接提取 Issue 列表
          gh issue list --repo trycosy/my-blog --limit 10 --json title,url,createdAt --template '{{range .}}- [{{.title}}]({{.url}}) — _{{substring .createdAt 0 10}}_\n{{end}}' > list.txt

          # 如果没有文章，则写入默认提示
          if [ ! -s list.txt ]; then
            echo "- 暂无文章" > list.txt
          fi

          # 2. 将列表插入到 README.md 对应的锚点中
          sed -i '/<!-- BLOG-LIST-START -->/,/<!-- BLOG-LIST-END -->/{//!d;};/<!-- BLOG-LIST-START -->/r list.txt' README.md

          # 3. 提交并推送
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add README.md
          git commit -m "chore: update blog list [skip ci]" || echo "No changes to commit"
          git push
