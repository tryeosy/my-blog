name: Update README with Issues

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, milestones]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README List
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 先用 gh 工具安全地倒序获取公开的标题、链接和创建时间 (TSV格式)
          gh issue list --repo "${{ github.repository }}" --limit 10 --json title,url,createdAt --template '{{range .}}{{.title}}\t{{.url}}\t{{.createdAt}}\n{{end}}' > raw_list.txt

          # 2. 如果文件不为空，用 Linux 强大的 awk/cut 提取前10位日期，组合成完美的 Markdown 列表
          if [ -s raw_list.txt ]; then
            awk -F'\t' '{print "- ["$1"]("$2") — _"substr($3,1,10)"_"}' raw_list.txt > list.txt
          else
            echo "- 暂无文章" > list.txt
          fi

          # 3. 将列表插入到 README.md 对应的锚点中
          sed -i '/<!-- BLOG-LIST-START -->/,/<!-- BLOG-LIST-END -->/{//!d;};/<!-- BLOG-LIST-START -->/r list.txt' README.md

          # 4. 提交并推送
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add README.md
          git commit -m "chore: update blog list [skip ci]" || echo "No changes to commit"
          git push
