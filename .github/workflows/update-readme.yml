name: Update README with Issues

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, milestones]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with GitHub Issues
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          # 👇 看这里！你的仓库路径现在清清楚楚写在下面这一行了：
          repo_path: "trycosy/my-blog"
          
          feed_list: "https://github.com"
          max_post_count: 10
          template: "- [$title]($url) — _$date_"
          date_format: "yyyy-mm-dd"
