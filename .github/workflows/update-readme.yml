name: Update README with Issues

on:
  issues:
    types: [opened, edited, deleted, labeled, unlabeled, milestones] # 监听写、改、删、打标签等所有事件，实现全自动触发
  workflow_dispatch: # 保留手动触发按钮，以备不时之需

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README List
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 严格单行：使用 gh 获取数据，并通过 jq 精准清洗标题、链接、日期和标签，彻底杜绝乱码
          gh issue list --repo "${{ github.repository }}" --limit 10 --json title,url,createdAt,labels | jq -r '.[] | "- [\(.title)](\(.url))" + if (.labels | length) > 0 then " — " + ([.labels[].name | "🏷️ " + .] | join(" ")) else "" end + " — _" + (.createdAt | .[0:10]) + "_"' > list.txt

          # 如果没有发布过任何文章，则写入默认提示
          if [ ! -s list.txt ]; then
            echo "- 暂无文章" > list.txt
          fi

          # 2. 将列表内容安全地插入到 README.md 对应的锚点中
          sed -i '/<!-- BLOG-LIST-START -->/,/<!-- BLOG-LIST-END -->/{//!d;};/<!-- BLOG-LIST-START -->/r list.txt' README.md

          # 3. 配置 Git 机器人自动提交并推送到主分支
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add README.md
          git commit -m "chore: update blog list [skip ci]" || echo "No changes to commit"
          git push
